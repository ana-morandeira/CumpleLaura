<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Feliz Cumpleaños Laura! 🎀</title>

  <!-- Tailwind CSS CDN (para utilidades secundarias) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Background decorative dots -->
  <div id="bg-dots"></div>

  <!-- ── Header ── -->
  <header>
    <p class="badge">🎀 Feliz Cumpleaños 🎀</p>
    <h1 class="title gradient-text">LAURA</h1>
    <p class="instruction">👂 Tira de sus orejas 👂</p>
  </header>

  <!-- ── Face ── -->
  <div id="face-wrapper">

    <!-- Left ear -->
    <svg id="ear-left" class="ear ear-left" viewBox="0 0 58 86" fill="none">
      <ellipse cx="29" cy="43" rx="27" ry="41" fill="#f9b8d4" stroke="#c2557a" stroke-width="2.5"/>
      <ellipse cx="33" cy="43" rx="16" ry="30" fill="#f48fb1" stroke="#c2557a" stroke-width="1.5"/>
      <ellipse cx="35" cy="43" rx="9"  ry="20" fill="#e91e8c" opacity="0.4"/>
    </svg>

    <!-- Photo frame -->
    <div id="photo-frame" class="photo-frame">
      <img src="LauraCartoon.png" alt="Laura" />
    </div>

    <!-- Right ear -->
    <svg id="ear-right" class="ear ear-right" viewBox="0 0 58 86" fill="none">
      <ellipse cx="29" cy="43" rx="27" ry="41" fill="#f9b8d4" stroke="#c2557a" stroke-width="2.5"/>
      <ellipse cx="25" cy="43" rx="16" ry="30" fill="#f48fb1" stroke="#c2557a" stroke-width="1.5"/>
      <ellipse cx="23" cy="43" rx="9"  ry="20" fill="#e91e8c" opacity="0.4"/>
    </svg>

  </div>

  <!-- ── Counter ── -->
  <div class="counter-box">
    <p class="counter-label">Tirones de oreja</p>
    <p id="counter" class="counter-number">0</p>
  </div>

  <!-- ── Activity bars ── -->
  <div class="activity-section">
    <p class="activity-label">⚡ Ritmo de tirones</p>
    <div id="rank-bars" class="rank-bars"></div>
  </div>

  <!-- App logic -->
  <script src="app.js"></script>

</body>
</html>
